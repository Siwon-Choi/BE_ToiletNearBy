# benchmark 프로필은 API 서버를 띄우지 않고 콘솔 실행만 하고 종료
spring.main.web-application-type=none

# benchmark 콘솔이 SQL 로그로 덮이지 않게 SQL 출력은 끈다.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.orm.jdbc.bind=off

# Supabase에 올린 서울 공공화장실 데이터 기준으로 결과가 나오는 기본 좌표다.
benchmark.nearby.lng=126.99885
benchmark.nearby.lat=37.59036

# 검색 반경과 반복 횟수다.
benchmark.nearby.range=3000
benchmark.nearby.runs=30
benchmark.nearby.warmup-runs=5
