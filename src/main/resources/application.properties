spring.application.name=toiletNearby
spring.profiles.default=local

# local 개발 기본 JWT secret이다.
# 배포 환경에서는 반드시 JWT_SECRET_KEY 환경변수로 덮어써야 한다.
jwt.secret-key=${JWT_SECRET_KEY:toilet-nearby-clone-secret-key-for-local-development}

# access token 만료 시간이다. 기본값은 1시간이다.
jwt.access-token-expiration-millis=${JWT_ACCESS_TOKEN_EXPIRATION_MILLIS:3600000}

# Kakao Local API 기본 주소다.
kakao.local.base-url=${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}

# Kakao REST API key다.
# local에서는 application-local-secret.properties 또는 환경변수로 넣고,
# 배포에서는 KAKAO_REST_API_KEY 환경변수로 넣는다.
kakao.local.rest-api-key=${KAKAO_REST_API_KEY:}
