# local에서 Supabase를 테스트할 때만 쓰는 비밀 설정 파일이다.
# 배포 서버에는 이 파일이 없어도 환경변수로 동작한다.
spring.config.import=optional:classpath:application-supabase-local.properties

# Supabase PostgreSQL 연결 정보다.
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# DB 커넥션 풀 설정이다.
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}

# 배포 DB는 앱이 테이블을 자동 생성/수정하지 않고, 스키마가 맞는지만 검증한다.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# 배포에서는 SQL 로그를 기본적으로 끈다.
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# 배포 JWT secret은 반드시 환경변수로 주입한다.
jwt.secret-key=${JWT_SECRET_KEY}
jwt.access-token-expiration-millis=${JWT_ACCESS_TOKEN_EXPIRATION_MILLIS:3600000}

# Kakao REST API key도 배포 환경변수로 주입한다.
kakao.local.rest-api-key=${KAKAO_REST_API_KEY}
